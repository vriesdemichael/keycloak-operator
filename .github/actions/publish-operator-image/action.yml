name: 'Publish Operator Image'
description: 'Build and publish the operator image to GHCR with attestations'

inputs:
  registry:
    description: 'Container registry'
    required: true
  image-name:
    description: 'Image name (repository)'
    required: true
  operator-version:
    description: 'Operator version to publish'
    required: true
  github-token:
    description: 'GitHub token for registry access'
    required: true
  github-actor:
    description: 'GitHub actor name'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

    - name: Log in to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.github-actor }}
        password: ${{ inputs.github-token }}

    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION="${{ inputs.operator-version }}"
        REVISION=${{ github.sha }}
        CREATED=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "revision=${REVISION}" >> $GITHUB_OUTPUT
        echo "created=${CREATED}" >> $GITHUB_OUTPUT
        echo "Publishing operator version: ${VERSION}"

    - name: Generate tags
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
      with:
        images: ${{ inputs.registry }}/${{ inputs.image-name }}
        tags: |
          type=raw,value=latest
          type=raw,value=v${{ steps.version.outputs.version }}
          type=raw,value=${{ steps.version.outputs.version }}
        labels: |
          org.opencontainers.image.title=Keycloak Operator
          org.opencontainers.image.description=GitOps-compatible Kubernetes operator for Keycloak
          org.opencontainers.image.vendor=Michaël de Vries
          org.opencontainers.image.licenses=MIT
          org.opencontainers.image.version=v${{ steps.version.outputs.version }}
          org.opencontainers.image.source=https://github.com/vriesdemichael/keycloak-operator
          org.opencontainers.image.url=https://github.com/vriesdemichael/keycloak-operator

    - uses: ./.github/actions/setup-tools

    - name: Set up ORAS
      uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

    - name: Build and push
      id: build
      shell: bash
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
        LABELS: ${{ steps.meta.outputs.labels }}
      run: |
        task image:publish \
          VERSION="${{ inputs.operator-version }}" \
          REVISION="${{ github.sha }}" \
          CREATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
          TAGS="$TAGS" \
          LABELS="$LABELS"

        # Extract digest for attestation
        DIGEST=$(jq -r '.["containerimage.digest"]' .task/image-metadata.json)
        echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

    - name: Generate SBOM
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        image: ${{ inputs.registry }}/${{ inputs.image-name }}:v${{ steps.version.outputs.version }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Attach SBOM as OCI artifact (Harbor-compatible)
      shell: bash
      run: |
        # Attach the SBOM as a plain OCI referrer using the OCI Referrers API
        # (OCI Distribution Spec v1.1). This makes the SBOM discoverable in Harbor
        # via the referrers API and displayed as an "accessory" in the Harbor UI.
        oras attach \
          --artifact-type application/spdx+json \
          --annotation "org.opencontainers.artifact.created=${{ steps.version.outputs.created }}" \
          --annotation "org.opencontainers.artifact.description=SPDX SBOM for keycloak-operator v${{ steps.version.outputs.version }}" \
          "${{ inputs.registry }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}" \
          "sbom.spdx.json:application/spdx+json"

    - name: Attest SBOM
      uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2.4.0
      with:
        subject-name: ${{ inputs.registry }}/${{ inputs.image-name }}
        subject-digest: ${{ steps.build.outputs.digest }}
        sbom-path: sbom.spdx.json
        push-to-registry: true

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
      with:
        name: sbom-operator-v${{ steps.version.outputs.version }}
        path: sbom.spdx.json
        retention-days: 90

    - name: Summary
      shell: bash
      run: |
        echo "### :whale: Operator Image Published" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**SBOM:** Attached as OCI artifact (\`application/spdx+json\`) discoverable via the OCI Referrers API (Harbor-compatible)" >> $GITHUB_STEP_SUMMARY
