# Dependabot configuration for automated dependency updates
# Manages Python dependencies, GitHub Actions, and Docker base images

version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix(operator-image)"
      prefix-development: "chore(operator-image)"
    labels:
      - "dependencies"
      - "python"
    groups:
      # Group patch updates together to reduce PR noise
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
      # Group dev dependencies
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-updates:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/images/kerberos-test"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "test"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/images/keycloak-optimized"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "test"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/images/operator"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "fix(operator-image)"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Never bump to Python pre-release versions (a, b, rc tags)
      - dependency-name: "python"
        versions: ["*a*", "*b*", "*rc*"]

  - package-ecosystem: "gomod"
    directory: "/tools/migration-toolkit"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix(migration-toolkit)"
    labels:
      - "dependencies"
      - "go"
