apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloaks.vriesdemichael.github.io
  labels:
    app.kubernetes.io/name: keycloak-operator
    app.kubernetes.io/component: crd
spec:
  group: vriesdemichael.github.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        description: Keycloak instance definition for dynamic identity and access management
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            description: Specification for a Keycloak instance
            properties:
              image:
                type: string
                description: Container image for Keycloak
              keycloakVersion:
                type: string
                description: Keycloak version override for custom images without version tags. Used to determine health port (24.x uses 8080, 25.x+ uses 9000). Auto-detected from image tag if not specified.
              replicas:
                type: integer
                description: Number of Keycloak replicas
                minimum: 1
                default: 1
              admin:
                type: object
                description: Admin credentials configuration
                properties:
                  existingSecret:
                    type: string
                    description: Name of an existing Kubernetes secret containing admin credentials (must contain 'username' and 'password' keys).
              admin_access:
                type: object
                description: Legacy admin credentials configuration (backward-compatible alias for .spec.admin).
                properties:
                  existingSecret:
                    type: string
                    description: Name of an existing Kubernetes secret containing admin credentials (must contain 'username' and 'password' keys).
              database:
                type: object
                description: >-
                  Database configuration with tiered support (ADR-088).
                  Tier 1 (cnpg): CloudNativePG-managed — operator resolves connection from CNPG Cluster.
                  Tier 2 (managed): Generic PostgreSQL — operator has direct connection access.
                  Tier 3 (external): Externally managed — operator connects but cannot back up.
                  Legacy: flat fields (host, database, etc.) for backward compatibility.
                  Exactly one tier or legacy flat fields must be specified.
                properties:
                  type:
                    type: string
                    enum:
                    - postgresql
                    - mysql
                    - mariadb
                    - oracle
                    - mssql
                    default: postgresql
                    description: Database type
                  cnpg:
                    type: object
                    description: 'Tier 1: CloudNativePG-managed database (ADR-088). Connection details are resolved automatically from the CNPG Cluster CR.'
                    properties:
                      clusterName:
                        type: string
                        description: Name of the CNPG Cluster resource
                      namespace:
                        type: string
                        description: Namespace of the CNPG Cluster (defaults to Keycloak namespace)
                    required:
                    - clusterName
                  managed:
                    type: object
                    description: 'Tier 2: Generic managed PostgreSQL database (ADR-088). Operator has direct connection access.'
                    properties:
                      host:
                        type: string
                        description: Database host
                      port:
                        type: integer
                        description: Database port (defaults to 5432 for postgresql)
                        minimum: 1
                        maximum: 65535
                      database:
                        type: string
                        description: Database name
                      username:
                        type: string
                        description: Database username
                      passwordSecret:
                        type: object
                        description: Secret reference for database password
                        properties:
                          name:
                            type: string
                          key:
                            type: string
                            default: password
                        required:
                        - name
                      credentialsSecret:
                        type: string
                        description: Kubernetes secret name with database credentials
                      connectionParams:
                        type: object
                        description: Additional database connection parameters
                        additionalProperties:
                          type: string
                      connectionPool:
                        type: object
                        description: Database connection pool configuration
                        properties:
                          maxConnections:
                            type: integer
                            default: 20
                            description: Maximum number of connections
                          minConnections:
                            type: integer
                            default: 5
                            description: Minimum number of connections
                          connectionTimeout:
                            type: string
                            default: 30s
                            description: Connection timeout
                      sslMode:
                        type: string
                        enum:
                        - disable
                        - allow
                        - prefer
                        - require
                        - verify-ca
                        - verify-full
                        default: require
                        description: SSL mode for database connections
                      pvcName:
                        type: string
                        description: Name of the PersistentVolumeClaim used by the database. Required for automated VolumeSnapshot backups before upgrades.
                      volumeSnapshotClassName:
                        type: string
                        description: VolumeSnapshotClass to use for pre-upgrade snapshots. If not specified, the cluster default VolumeSnapshotClass is used.
                    required:
                    - host
                    - database
                  external:
                    type: object
                    description: 'Tier 3: Externally managed database (ADR-088). Operator connects but cannot perform backups. Requires manual gate during upgrades.'
                    properties:
                      host:
                        type: string
                        description: Database host
                      port:
                        type: integer
                        description: Database port (defaults to 5432 for postgresql)
                        minimum: 1
                        maximum: 65535
                      database:
                        type: string
                        description: Database name
                      username:
                        type: string
                        description: Database username
                      passwordSecret:
                        type: object
                        description: Secret reference for database password
                        properties:
                          name:
                            type: string
                          key:
                            type: string
                            default: password
                        required:
                        - name
                      credentialsSecret:
                        type: string
                        description: Kubernetes secret name with database credentials
                      connectionParams:
                        type: object
                        description: Additional database connection parameters
                        additionalProperties:
                          type: string
                      connectionPool:
                        type: object
                        description: Database connection pool configuration
                        properties:
                          maxConnections:
                            type: integer
                            default: 20
                            description: Maximum number of connections
                          minConnections:
                            type: integer
                            default: 5
                            description: Minimum number of connections
                          connectionTimeout:
                            type: string
                            default: 30s
                            description: Connection timeout
                      sslMode:
                        type: string
                        enum:
                        - disable
                        - allow
                        - prefer
                        - require
                        - verify-ca
                        - verify-full
                        default: require
                        description: SSL mode for database connections
                    required:
                    - host
                    - database
                  host:
                    type: string
                    description: Database host (legacy flat field — use tiered config instead)
                  port:
                    type: integer
                    description: Database port (auto-detected if not specified)
                    minimum: 1
                    maximum: 65535
                  database:
                    type: string
                    description: Database name (legacy flat field — use tiered config instead)
                  username:
                    type: string
                    description: Database username
                  passwordSecret:
                    type: object
                    description: Secret reference for database password
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                        default: password
                    required:
                    - name
                  credentialsSecret:
                    type: string
                    description: Kubernetes secret name with database credentials (alternative to username/passwordSecret)
                  connectionParams:
                    type: object
                    description: Additional database connection parameters
                    additionalProperties:
                      type: string
                  connectionPool:
                    type: object
                    description: Database connection pool configuration
                    properties:
                      maxConnections:
                        type: integer
                        default: 20
                        description: Maximum number of connections
                      minConnections:
                        type: integer
                        default: 5
                        description: Minimum number of connections
                      connectionTimeout:
                        type: string
                        default: 30s
                        description: Connection timeout
                  sslMode:
                    type: string
                    enum:
                    - disable
                    - allow
                    - prefer
                    - require
                    - verify-ca
                    - verify-full
                    default: require
                    description: SSL mode for database connections
                  migrationStrategy:
                    type: string
                    enum:
                    - auto
                    - manual
                    - skip
                    default: auto
                    description: Database migration strategy
                required:
                - type
              tls:
                type: object
                description: TLS/SSL configuration
                properties:
                  enabled:
                    type: boolean
                    default: false
                  secretName:
                    type: string
                    description: Secret containing TLS certificate
                  hostname:
                    type: string
                    description: Hostname for TLS certificate (SNI)
              service:
                type: object
                description: Service configuration
                properties:
                  type:
                    type: string
                    enum:
                    - ClusterIP
                    - NodePort
                    - LoadBalancer
                    default: ClusterIP
                  httpPort:
                    type: integer
                    minimum: 1
                    maximum: 65535
                    default: 8080
                  httpsPort:
                    type: integer
                    minimum: 1
                    maximum: 65535
                    default: 8443
                  annotations:
                    type: object
                    additionalProperties:
                      type: string
              ingress:
                type: object
                description: Ingress configuration
                properties:
                  enabled:
                    type: boolean
                    default: false
                  host:
                    type: string
                    description: Ingress hostname
                  path:
                    type: string
                    description: Ingress path
                    default: /
                  tlsEnabled:
                    type: boolean
                    default: true
                  tlsSecretName:
                    type: string
                    description: Secret name for ingress TLS certificate
                  annotations:
                    type: object
                    additionalProperties:
                      type: string
                  className:
                    type: string
                    description: Ingress class name
              resources:
                type: object
                description: Resource requirements
                properties:
                  requests:
                    type: object
                    additionalProperties:
                      type: string
                  limits:
                    type: object
                    additionalProperties:
                      type: string
              env:
                type: object
                description: Environment variables
                additionalProperties:
                  type: string
              jvmOptions:
                type: array
                description: JVM options for Keycloak (e.g., heap size, GC settings)
                items:
                  type: string
                example:
                - -Xms512m
                - -Xmx2048m
                - -XX:+UseG1GC
              optimized:
                type: boolean
                default: true
                description: Use --optimized startup flag. Set to true when using a pre-built Keycloak image. Set to false for stock images that have not been pre-built with kc.sh build.
              serviceAccount:
                type: string
                description: Service account name for Keycloak pods (for workload identity)
              startupProbe:
                type: object
                description: Startup probe configuration (overrides defaults)
                x-kubernetes-preserve-unknown-fields: true
              livenessProbe:
                type: object
                description: Liveness probe configuration (overrides defaults)
                x-kubernetes-preserve-unknown-fields: true
              readinessProbe:
                type: object
                description: Readiness probe configuration (overrides defaults)
                x-kubernetes-preserve-unknown-fields: true
              podSecurityContext:
                type: object
                description: Pod-level security context (fsGroup, runAsUser, etc.)
                x-kubernetes-preserve-unknown-fields: true
              securityContext:
                type: object
                description: Container-level security context (capabilities, privileged, etc.)
                x-kubernetes-preserve-unknown-fields: true
              realmCapacity:
                type: object
                description: Capacity management for realms
                properties:
                  maxRealms:
                    type: integer
                    description: Maximum number of realms (null = unlimited)
                    minimum: 1
                  allowNewRealms:
                    type: boolean
                    description: Whether to allow creation of new realms
                    default: true
                  capacityMessage:
                    type: string
                    description: Message to show when capacity is reached
              tracing:
                type: object
                description: OpenTelemetry distributed tracing configuration for Keycloak
                properties:
                  enabled:
                    type: boolean
                    description: Enable OpenTelemetry tracing in Keycloak
                    default: false
                  endpoint:
                    type: string
                    description: OTLP collector endpoint (gRPC)
                    default: "http://localhost:4317"
                  serviceName:
                    type: string
                    description: Service name for traces
                    default: "keycloak"
                  sampleRate:
                    type: number
                    description: Trace sampling rate (0.0-1.0)
                    minimum: 0
                    maximum: 1
                    default: 1.0
              maintenanceMode:
                type: object
                description: >-
                  Maintenance mode configuration for blue-green upgrades (ADR-088).
                  When enabled, the ingress is annotated to block or limit traffic
                  before the old deployment is scaled down.
                properties:
                  enabled:
                    type: boolean
                    description: Enable maintenance mode
                    default: false
                  mode:
                    type: string
                    description: >-
                      Maintenance mode type: read-only blocks mutating admin/account
                      paths while keeping authentication and token flows available;
                      full-block returns 503 for all requests.
                    enum:
                    - read-only
                    - full-block
                    default: full-block
                  excludePaths:
                    type: array
                    description: Paths excluded from maintenance mode (always accessible, e.g. health endpoints)
                    items:
                      type: string
                    default:
                    - /health
                    - /health/live
                    - /health/ready
                    - /health/started
                  blockedPaths:
                    type: array
                    description: >-
                      Paths blocked in read-only mode (any HTTP method). Supports nginx regex.
                      Defaults target admin console, user account self-service,
                      new user registration, and IdP-linking routes.
                      Authentication and token endpoints are not blocked by default.
                      Has no effect in full-block mode.
                    items:
                      type: string
                    default:
                    - /admin
                    - /realms/[^/]+/account
                    - /realms/[^/]+/login-actions/registration
                    - /realms/[^/]+/broker
              cacheIsolation:
                type: object
                description: >-
                  JGroups cache isolation configuration for blue-green upgrades (ADR-088, ADR-090).
                  Ensures old and new Keycloak versions form separate clusters
                  by using distinct JGroups cluster names and discovery service selectors.
                properties:
                  clusterName:
                    type: string
                    description: >-
                      Explicit JGroups cluster name. When set, the discovery service
                      selector is scoped to pods with this cluster label, preventing
                      cross-version cache poisoning during blue-green upgrades.
                  autoRevision:
                    type: boolean
                    description: >-
                      Derive the cluster name from the image major version only
                      (e.g. 'my-kc-v26'). Stable across patch upgrades — the cluster
                      name stays the same for 26.0.0 → 26.0.1. Requires a semver
                      image tag; non-semver tags disable isolation and emit a warning.
                      Takes priority over autoSuffix. Overridden by explicit clusterName.
                    default: false
                  autoSuffix:
                    type: boolean
                    description: >-
                      Automatically append Keycloak version to the cluster name
                      to isolate caches between versions. Overridden by explicit clusterName.
                    default: false
              upgradePolicy:
                type: object
                description: >-
                  Upgrade policy configuration for Keycloak version upgrades (ADR-088 Phase 2).
                  Controls pre-upgrade backup behavior and upgrade strategy.
                  When present, the admission webhook also enforces semantic version image tags.
                properties:
                  backupTimeout:
                    type: integer
                    description: >-
                      Maximum time in seconds to wait for a pre-upgrade backup to complete.
                      Applies to CNPG and VolumeSnapshot backups.
                    default: 600
                    minimum: 60
                    maximum: 3600
              operatorRef:
                type: object
                description: Reference to the operator instance managing this resource (ADR-062)
                properties:
                  namespace:
                    type: string
                    description: Namespace where the operator is running
                required:
                - namespace
            required:
            - database
          status:
            type: object
            description: Current status of the Keycloak instance
            properties:
              phase:
                type: string
                description: Current phase
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Updating
                - Degraded
                - Paused
                - BackingUp
                - WaitingForBackupConfirmation
              message:
                type: string
                description: Human-readable status message
              reason:
                type: string
                description: Reason for current phase
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                      enum:
                      - 'True'
                      - 'False'
                      - Unknown
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
              observedGeneration:
                type: integer
                description: Generation of spec that was last processed
              adminUsername:
                type: string
              adminSecret:
                type: string
              internalUrl:
                type: string
              externalUrl:
                type: string
              endpoints:
                type: object
                description: Keycloak service endpoints
                properties:
                  admin:
                    type: string
                    description: Admin endpoint URL
                  public:
                    type: string
                    description: Public endpoint URL
                  management:
                    type: string
                    description: Management endpoint URL
              deployment:
                type: string
                description: Name of the Keycloak deployment
              service:
                type: string
                description: Name of the Keycloak service
              readyReplicas:
                type: integer
              lastHealthCheck:
                type: string
                format: date-time
              databaseStatus:
                type: string
                enum:
                - Connected
                - Connecting
                - Failed
                - Unknown
              realmCount:
                type: integer
                description: Current number of managed realms
              acceptingNewRealms:
                type: boolean
                description: Whether new realm creation is currently allowed
                default: true
              capacityStatus:
                type: string
                description: Human-readable capacity status message
              currentVersion:
                type: string
                description: Currently running Keycloak version (extracted from deployment image)
              previousVersion:
                type: string
                description: Previous Keycloak version before the last upgrade
              lastBackupName:
                type: string
                description: Name of the last pre-upgrade backup resource (CNPG Backup or VolumeSnapshot)
              lastBackupTime:
                type: string
                format: date-time
                description: Timestamp of the last pre-upgrade backup
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Ready
      type: integer
      jsonPath: .status.readyReplicas
    - name: External URL
      type: string
      jsonPath: .status.externalUrl
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: keycloaks
    singular: keycloak
    kind: Keycloak
    shortNames:
    - kc
